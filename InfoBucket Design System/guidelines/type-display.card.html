<!-- @dsCard group="Type" viewport="700x230" name="Display — Bricolage Grotesque" subtitle="Titles, bucket names, UI chrome — the system's voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--bg); color: var(--text-primary); padding: 24px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 130px; flex: none; letter-spacing: .04em; }
  .display { font-size: var(--t-display); line-height: var(--t-display-lh); font-weight: 800; letter-spacing: -.02em; }
  .title { font-size: var(--t-title); line-height: var(--t-title-lh); font-weight: 700; letter-spacing: -.01em; }
  .heading { font-size: var(--t-heading); line-height: var(--t-heading-lh); font-weight: 600; }
  .body { font-size: var(--t-body); line-height: var(--t-body-lh); font-weight: 400; }
</style>
</head>
<body>
  <div class="row"><span class="tag">display / 32·800</span><span class="display">All sorted</span></div>
  <div class="row"><span class="tag">title / 24·700</span><span class="title">Reading list</span></div>
  <div class="row"><span class="tag">heading / 19·600</span><span class="heading">How transformers learn</span></div>
  <div class="row"><span class="tag">body / 15·400</span><span class="body">Accept the proposed bucket, or pick another.</span></div>
</body>
</html>
