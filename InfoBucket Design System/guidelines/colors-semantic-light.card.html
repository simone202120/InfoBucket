<!-- @dsCard group="Colors" viewport="700x210" name="Semantic — light" subtitle="Surfaces, text, primary, accent & feedback in the default light theme" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--bg); color: var(--text-primary); }
  .wrap { padding: 18px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
  .sw { border-radius: var(--r-sm); border: 1px solid var(--border); padding: 10px; height: 40px; display: flex; align-items: flex-end; }
  .t { font-family: var(--font-mono); font-size: 10px; letter-spacing: .03em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--bg)"><span class="t" style="color:var(--text-secondary)">bg</span></div>
    <div class="sw" style="background:var(--surface)"><span class="t" style="color:var(--text-secondary)">surface</span></div>
    <div class="sw" style="background:var(--bg-sunken)"><span class="t" style="color:var(--text-secondary)">sunken</span></div>
    <div class="sw" style="background:var(--surface-hover)"><span class="t" style="color:var(--text-secondary)">hover</span></div>
    <div class="sw" style="background:var(--primary)"><span class="t" style="color:var(--text-on-primary)">primary</span></div>
    <div class="sw" style="background:var(--primary-soft)"><span class="t" style="color:var(--primary)">primary-soft</span></div>
    <div class="sw" style="background:var(--accent)"><span class="t" style="color:var(--text-on-accent)">accent</span></div>
    <div class="sw" style="background:var(--accent-soft)"><span class="t" style="color:var(--accent)">accent-soft</span></div>
    <div class="sw" style="background:var(--success)"><span class="t" style="color:#fff">success</span></div>
    <div class="sw" style="background:var(--warning)"><span class="t" style="color:#fff">warning</span></div>
    <div class="sw" style="background:var(--danger)"><span class="t" style="color:#fff">danger</span></div>
    <div class="sw" style="background:var(--surface);border-color:var(--border-strong)"><span class="t" style="color:var(--text-primary)">border-strong</span></div>
    <div class="sw" style="background:var(--surface)"><span class="t" style="color:var(--text-primary)">text-primary</span></div>
    <div class="sw" style="background:var(--surface)"><span class="t" style="color:var(--text-secondary)">text-secondary</span></div>
    <div class="sw" style="background:var(--surface)"><span class="t" style="color:var(--text-tertiary)">text-tertiary</span></div>
    <div class="sw" style="background:var(--surface)"><span class="t" style="color:var(--primary)">link / action</span></div>
  </div>
</body>
</html>
