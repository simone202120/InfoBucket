<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="Mark + wordmark — the bucket catches a settling item" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--bg); padding: 0; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; }
  .cell { padding: 28px 30px; display: flex; align-items: center; gap: 18px; }
  .light { background: var(--paper); color: var(--ink); }
  .dark { background: var(--ink); color: var(--paper); }
  .mark { width: 44px; height: 44px; }
  .word { width: 184px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell light" style="color:var(--ink)">
      <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(-13 24 13)">
          <path d="M17.4 8 A2.6 2.6 0 0 1 20 5.4 L27.2 5.4 L31.4 9.6 L31.4 18 A2.6 2.6 0 0 1 28.8 20.6 L20 20.6 A2.6 2.6 0 0 1 17.4 18 Z" fill="#7CA84F"></path>
          <path d="M27.2 5.4 L27.2 9.6 L31.4 9.6" fill="none" stroke="#16240F" stroke-width="1.4" stroke-linejoin="round" stroke-opacity=".5"></path>
          <path d="M20.8 13 H27 M20.8 16 H25" stroke="#16240F" stroke-width="1.6" stroke-linecap="round" stroke-opacity=".62"></path>
        </g>
        <path d="M9.6 21 L12.9 37.6 A3.6 3.6 0 0 0 16.4 40.4 L31.6 40.4 A3.6 3.6 0 0 0 35.1 37.6 L38.4 21 Z" fill="currentColor"></path>
        <ellipse cx="24" cy="21" rx="14.4" ry="3.9" fill="currentColor"></ellipse>
        <ellipse cx="24" cy="21" rx="10.6" ry="2.5" fill="#000" fill-opacity=".18"></ellipse>
        <circle cx="38.6" cy="11.4" r="1.7" fill="#7CA84F"></circle>
        <circle cx="42.6" cy="15.4" r="1" fill="#7CA84F" fill-opacity=".6"></circle>
      </svg>
      <span style="font-size:24px;font-weight:800;letter-spacing:-.02em;color:var(--primary)">Info<span style="font-weight:600;color:var(--ink)">Bucket</span></span>
    </div>
    <div class="cell dark" style="color:#EAEEF2">
      <svg class="mark" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(-13 24 13)">
          <path d="M17.4 8 A2.6 2.6 0 0 1 20 5.4 L27.2 5.4 L31.4 9.6 L31.4 18 A2.6 2.6 0 0 1 28.8 20.6 L20 20.6 A2.6 2.6 0 0 1 17.4 18 Z" fill="#9CC57E"></path>
          <path d="M27.2 5.4 L27.2 9.6 L31.4 9.6" fill="none" stroke="#0C1A0F" stroke-width="1.4" stroke-linejoin="round" stroke-opacity=".5"></path>
          <path d="M20.8 13 H27 M20.8 16 H25" stroke="#0C1A0F" stroke-width="1.6" stroke-linecap="round" stroke-opacity=".58"></path>
        </g>
        <path d="M9.6 21 L12.9 37.6 A3.6 3.6 0 0 0 16.4 40.4 L31.6 40.4 A3.6 3.6 0 0 0 35.1 37.6 L38.4 21 Z" fill="currentColor"></path>
        <ellipse cx="24" cy="21" rx="14.4" ry="3.9" fill="currentColor"></ellipse>
        <ellipse cx="24" cy="21" rx="10.6" ry="2.5" fill="#000" fill-opacity=".28"></ellipse>
        <circle cx="38.6" cy="11.4" r="1.7" fill="#9CC57E"></circle>
        <circle cx="42.6" cy="15.4" r="1" fill="#9CC57E" fill-opacity=".6"></circle>
      </svg>
      <span style="font-size:24px;font-weight:800;letter-spacing:-.02em;color:#9CC57E">Info<span style="font-weight:600;color:#fff">Bucket</span></span>
    </div>
  </div>
</body>
</html>
