<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--bg); color: var(--text-primary); padding: 26px; }
  .wrap { display: flex; gap: 26px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 60px; background: var(--surface); border-radius: var(--r-lg); }
  .lab { font-size: 10px; color: var(--text-tertiary); letter-spacing: .03em; }
  .fab { width: 60px; height: 60px; border-radius: var(--r-pill); background: var(--primary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lab">shadow-sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lab">shadow-md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lab">shadow-lg</span></div>
    <div class="item"><div class="fab" style="box-shadow:var(--shadow-fab)"></div><span class="lab">shadow-fab</span></div>
  </div>
</body>
</html>
