<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--bg); color: var(--text-primary); padding: 22px; }
  .wrap { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 64px; height: 56px; background: var(--surface); border: 1.5px solid var(--border-strong); }
  .lab { font-size: 10px; color: var(--text-tertiary); letter-spacing: .03em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><span class="lab">xs · 6</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><span class="lab">sm · 10</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><span class="lab">md · 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><span class="lab">lg · 16</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><span class="lab">xl · 22</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-pill);width:90px"></div><span class="lab">pill</span></div>
  </div>
</body>
</html>
