<!-- @dsCard group="Colors" viewport="700x150" name="Source palette (provenance)" subtitle="The signature system — each origin owns a hue, used only in source stamps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--bg); color: var(--text-primary); }
  .wrap { padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .src { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .stamp { width: 46px; height: 46px; border-radius: var(--r-md); display: grid; place-items: center; }
  .stamp svg { width: 22px; height: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="src"><div class="stamp" style="background:var(--src-article-soft);color:var(--src-article)"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M4 5h16v14H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg></div><div class="lbl">Article</div></div>
    <div class="src"><div class="stamp" style="background:var(--src-video-soft);color:var(--src-video)"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="3"/><path d="M11 9.5l4 2.5-4 2.5z" fill="currentColor" stroke="none"/></svg></div><div class="lbl">Video</div></div>
    <div class="src"><div class="stamp" style="background:var(--src-social-soft);color:var(--src-social)"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor" stroke="none"/></svg></div><div class="lbl">Reel</div></div>
    <div class="src"><div class="stamp" style="background:var(--src-document-soft);color:var(--src-document)"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4M10 13h6M10 17h6"/></svg></div><div class="lbl">Document</div></div>
    <div class="src"><div class="stamp" style="background:var(--src-note-soft);color:var(--src-note)"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M5 4h14v16l-4-3-3 3-3-3-4 3z"/></svg></div><div class="lbl">Note</div></div>
  </div>
</body>
</html>
