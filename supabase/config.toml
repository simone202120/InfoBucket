# Config Supabase CLI per InfoBucket.
# Riferimento: https://supabase.com/docs/guides/cli/config
# project_id è un identificatore locale: sostituiscilo con quello reale quando
# colleghi il progetto (`supabase link --project-ref <ref>`).
project_id = "infobucket"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Allinea alla major version di Postgres del progetto cloud.
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Single-user: in locale va bene il default; in produzione configura il sito reale.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
# Documenti caricati (spec §4): alza il limite se servono PDF grandi.
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
# Le Edge Functions girano in Deno (dispatch, generate).
policy = "oneshot"

[functions.dispatch]
verify_jwt = false

[functions.generate]
verify_jwt = false

# La ricerca è invocata dal client autenticato: il JWT serve per RLS/auth.uid().
[functions.search]
verify_jwt = true
